<div class="btn-group mb-3" role="group">
    <button class="btn" [class.btn-primary]="selectedGroup==='All'"
        [class.btn-outline-secondary]="selectedGroup!=='All'" (click)="setGroup('All')">{{ groupLabel('All') }}</button>

    <button class="btn" [class.btn-primary]="selectedGroup==='Family'"
        [class.btn-outline-secondary]="selectedGroup!=='Family'" (click)="setGroup('Family')">{{ groupLabel('Family')
        }}</button>

    <button class="btn" [class.btn-primary]="selectedGroup==='Strategy'"
        [class.btn-outline-secondary]="selectedGroup!=='Strategy'" (click)="setGroup('Strategy')">{{
        groupLabel('Strategy') }}</button>

    <button class="btn" [class.btn-primary]="selectedGroup==='Party'"
        [class.btn-outline-secondary]="selectedGroup!=='Party'" (click)="setGroup('Party')">{{ groupLabel('Party')
        }}</button>
</div>

<div class="row g-3">
    <div class="col-6 col-md-4 col-lg-3" *ngFor="let g of displayedGames">
        <div class="card h-100">
            <img [src]="'/assets/images/games/' + g.images[0]" class="card-img-top game-image" alt="{{g.name}}">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title">{{ displayName(g) }}</h5>
                <p class="card-text mb-2 small">{{g.players}} | {{g.age}} | {{g.duration}} | {{ displayGroup(g) }}</p>
                <p class="mb-2"><strong>{{g.price}} RSD</strong></p>

                <div class="mt-auto d-flex gap-2">
                    <button [routerLink]="['/catalog', g.id]" class="btn btn-sm btn-outline-secondary flex-fill text-center">
                        {{t['Details']}}
                    </button>

                    <button class="btn btn-sm btn-primary flex-fill text-center" (click)="addToCart(g)">
                        {{t['AddToCart']}}
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
